<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&family=EB+Garamond:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    font-family: 'EB Garamond', serif;
    color: #1e2f28;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  .card {
    max-width: 560px;
    width: 100%;
    background: #ffffff;
    border: 1px solid #c9a962;
    box-shadow: 0 0 0 6px #ffffff, 0 0 0 7px #c9a962;
  }

  .banner {
    background: #1e2f28;
    padding: 48px 32px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .banner::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,98,0.25), transparent 70%);
  }

  .banner .eyebrow {
    color: #c9a962;
    letter-spacing: 4px;
    font-size: 12px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .banner .names {
    font-family: 'Great Vibes', cursive;
    font-size: 44px;
    color: #fdfcf8;
    line-height: 1.1;
  }

  .body-content { padding: 36px 32px 40px; text-align: center; }

  .date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600;
    color: #1e2f28;
    letter-spacing: 2px;
  }

  .venue {
    margin-top: 10px;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #3d3d3a;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 22px 0;
    color: #c9a962;
  }
  .divider .line { flex: 1; max-width: 90px; height: 1px; background: #c9a962; }

  .note {
    font-family: 'Great Vibes', cursive;
    font-size: 26px;
    color: #4a4a44;
    margin-bottom: 28px;
  }

  form { text-align: left; }

  label {
    display: block;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #5f5e5a;
    margin: 16px 0 6px;
  }

  input[type="text"], input[type="email"], input[type="number"], textarea, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d3d1c7;
    background: #fff;
    font-family: 'EB Garamond', serif;
    font-size: 16px;
    color: #1e2f28;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #c9a962;
  }

  .radio-row { display: flex; gap: 20px; margin-top: 6px; }
  .radio-row label {
    display: flex; align-items: center; gap: 6px;
    text-transform: none; letter-spacing: 0; font-size: 15px;
    margin: 0; color: #1e2f28; cursor: pointer;
  }

  .submit-btn {
    width: 100%;
    margin-top: 26px;
    padding: 14px;
    background: #1e2f28;
    color: #fdfcf8;
    border: none;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .submit-btn:hover { background: #2a3f36; }
  .submit-btn:disabled { opacity: 0.6; cursor: default; }

  .confirm {
    display: none;
    text-align: center;
    padding: 20px 0 4px;
  }
  .confirm .check {
    font-size: 32px;
    color: #1e2f28;
  }
  .confirm p { margin-top: 8px; color: #5f5e5a; font-size: 15px; }

  .error-msg {
    display: none;
    color: #A32D2D;
    font-size: 13px;
    margin-top: 14px;
    text-align: center;
  }

  .footer-bar {
    background: #1e2f28;
    color: #d3d1c7;
    text-align: center;
    padding: 18px 24px;
    font-size: 13px;
  }
  .footer-bar a { color: #c9a962; text-decoration: none; }

  input[type="text"], input[type="email"], input[type="number"], textarea, select {
    background: #ffffff;
  }
</style>
</head>
<body>

<div class="card">
  <div class="banner">
    <div class="eyebrow">You're invited</div>
    <div class="names">Purnima &amp; Suraj</div>
  </div>

  <div class="body-content">
    <div class="date">02.12.2026</div>
    <div class="venue">Hotel Gokarna Venue<br>Kathmandu</div>
    <div class="divider"><span class="line"></span>&#10022;<span class="line"></span></div>
    <div class="note">Kindly RSVP below</div>

    <form id="rsvpForm">
      <label for="fname">Full name</label>
      <input type="text" id="fname" name="name" placeholder="Your name" required>

      <label for="femail">Email (optional, for updates)</label>
      <input type="email" id="femail" name="email" placeholder="name@example.com">

      <label>Will you be attending?</label>
      <div class="radio-row">
        <label><input type="radio" name="attending" value="Joyfully accepts" checked> Joyfully accept</label>
        <label><input type="radio" name="attending" value="Regretfully declines"> Regretfully decline</label>
      </div>

      <label for="fguests">Number of guests (including you)</label>
      <input type="number" id="fguests" name="guests" min="1" max="10" value="1">

      <label for="fmsg">Message (optional)</label>
      <textarea id="fmsg" name="message" rows="3" placeholder="Leave a note for the couple"></textarea>

      <button type="submit" class="submit-btn" id="submitBtn">Send RSVP</button>
      <div class="error-msg" id="errorMsg">Something went wrong sending your RSVP. Please try again, or email us directly.</div>
    </form>

    <div class="confirm" id="confirmBox">
      <div class="check">&#10003;</div>
      <p id="confirmText">Your RSVP has been sent.</p>
    </div>
  </div>

  <div class="footer-bar">
    For any questions, please contact us at<br>
    <a href="mailto:purnimasurajwedding@gmail.com">purnimasurajwedding@gmail.com</a>
  </div>
</div>

<script>
const FORM_ENDPOINT = "https://formspree.io/f/xeeyaavp";
const form = document.getElementById('rsvpForm');
const submitBtn = document.getElementById('submitBtn');
const confirmBox = document.getElementById('confirmBox');
const confirmText = document.getElementById('confirmText');
const errorMsg = document.getElementById('errorMsg');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending\u2026';
  errorMsg.style.display = 'none';

  const name = document.getElementById('fname').value.trim();
  const attendingInput = document.querySelector('input[name="attending"]:checked');
  const attending = attendingInput.value;
  const isAttending = attending === 'Joyfully accepts';

  const formData = new FormData(form);
  formData.set('_subject', 'RSVP from ' + name + ' \u2014 ' + attending);

  try {
    const response = await fetch(FORM_ENDPOINT, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      form.style.display = 'none';
      confirmBox.style.display = 'block';
      confirmText.textContent = isAttending
        ? 'Thank you, ' + name + '! We can\'t wait to celebrate with you.'
        : 'Thank you for letting us know, ' + name + '. You will be missed.';
    } else {
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send RSVP';
    }
  } catch (err) {
    errorMsg.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send RSVP';
  }
});
</script>

</body>
</html>
